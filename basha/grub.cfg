# GRUB custom menu entry for Minimal Bash OS
# Place this in /etc/grub.d/40_custom on your target system, then run update-grub.

# Adjust paths to match your /boot layout. Typical:
#   /boot/vmlinuz-minimal
#   /boot/initramfs-minimal.cpio.gz

menuentry "Minimal Bash OS" {
    # If /boot is on a separate partition, root may differ.
    # For a single-disk setup where /boot is on the same partition as /:
    set root='(hd0,1)'

    # Kernel path relative to GRUB root. If /boot is its own partition,
    # use /vmlinuz-minimal instead of /boot/vmlinuz-minimal.
    linux   /boot/vmlinuz-minimal root=/dev/ram0 rw quiet
    initrd  /boot/initramfs-minimal.cpio.gz
}

